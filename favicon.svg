<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Rounded border background -->
  <rect width="192" height="192" rx="40" ry="40" fill="#ffffff" stroke="#1a73e8" stroke-width="8"/>
  
  <!-- Simple hostel icon - building with door and windows -->
  <g transform="translate(48, 48)">
    <!-- Building -->
    <rect x="10" y="20" width="76" height="80" fill="#1a73e8" rx="4"/>
    
    <!-- Door -->
    <rect x="38" y="70" width="20" height="30" fill="#fff" rx="2"/>
    <circle cx="55" cy="85" r="2" fill="#1a73e8"/>
    
    <!-- Windows -->
    <rect x="20" y="35" width="14" height="14" fill="#fff" rx="1"/>
    <rect x="42" y="35" width="14" height="14" fill="#fff" rx="1"/>
    <rect x="64" y="35" width="14" height="14" fill="#fff" rx="1"/>
    
    <rect x="20" y="57" width="14" height="14" fill="#fff" rx="1"/>
    <rect x="64" y="57" width="14" height="14" fill="#fff" rx="1"/>
    
    <!-- Roof -->
    <polygon points="0,20 48,0 96,20" fill="#ff6b35"/>
  </g>
</svg>